# image = postgres:16, container-name = tp-postgres, user = admin, password = password123
# image = pgadmin:latest, container-name = tp-pgadmin, email = admin@itu.edu.tr, password = admin

services:
  db:
    image: postgres:16
    container_name: tp-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tool_presentation_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tp-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@itu.edu.tr
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data: